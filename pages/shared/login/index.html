<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MerlinAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-dark: #2A1731;
      --primary-darker: #3B1F46;
      --primary-base: #5D2F70;
      --secondary-base: #FDDC8D;

      --bg-strong: #171717;
      --bg-surface: #262626;
      --bg-soft: #EBEBEB;
      --bg-weak: #F7F7F7;
      --bg-white: #FFFFFF;

      --text-strong: #171717;
      --text-sub: #5C5C5C;
      --text-soft: #A3A3A3;
      --text-disabled: #D1D1D1;

      --stroke-strong: #171717;
      --stroke-sub: #D1D1D1;
      --stroke-soft: #EBEBEB;

      --success-base: #1FC16B;
      --error-base: #FB3748;

      --brand-50: #F6F1FA;
      --brand-100: #E1D3F0;
      --brand-200: #BC9FD3;
      --brand-300: #A074B7;
      --brand-400: #6E3785;
      --brand-500: #5D2F70;
      --brand-600: #4C285B;
      --brand-700: #3B1F46;
      --brand-800: #2A1731;
      --brand-900: #231428;
      --brand-950: #1B101E;

      --golden-500: #FDDC8D;
      --golden-600: #E9B669;
      --golden-700: #C9974E;
      --golden-800: #A17439;

      --font-family: 'Inter', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      color: var(--text-strong);
      background: var(--brand-950);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    /* Phone frame */
    .phone-frame {
      width: 390px;
      height: 844px;
      background: var(--bg-white);
      border-radius: 48px;
      box-shadow:
        0 0 0 2px #0D0D0D,
        0 0 0 7px #2A2A2A,
        0 0 0 9px #0D0D0D,
        0 50px 100px rgba(0, 0, 0, 0.5),
        0 20px 40px rgba(93, 47, 112, 0.15);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 36px;
      background: #000000;
      border-radius: 20px;
      z-index: 10;
    }

    /* Hero header */
    .hero-header {
      background: linear-gradient(170deg, var(--brand-950) 0%, var(--primary-dark) 35%, var(--primary-base) 100%);
      padding: 0 28px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .hero-header::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -60px;
      width: 220px;
      height: 220px;
      border: 2px solid rgba(253, 220, 141, 0.08);
      border-radius: 50%;
    }

    .hero-header::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -30px;
      width: 160px;
      height: 160px;
      border: 2px solid rgba(253, 220, 141, 0.05);
      border-radius: 50%;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 8px,
        rgba(253, 220, 141, 1) 8px,
        rgba(253, 220, 141, 1) 9px
      );
    }

    /* Status bar */
    .status-bar {
      height: 54px;
      padding: 14px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      margin-bottom: 36px;
    }

    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: #FFFFFF;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand-logo-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--golden-600) 0%, var(--golden-500) 100%);
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(233, 182, 105, 0.3);
    }

    .brand-logo-icon svg {
      width: 24px;
      height: 24px;
    }

    .brand-logo-text {
      font-size: 28px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 34px;
      letter-spacing: -0.5px;
    }

    .brand-logo-text span {
      color: var(--golden-500);
    }

    .hero-tagline {
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      color: var(--brand-200);
      letter-spacing: -0.1px;
      max-width: 260px;
      margin: 0 auto;
    }

    /* Curved transition */
    .curve-transition {
      height: 24px;
      background: var(--bg-white);
      margin-top: -24px;
      border-radius: 24px 24px 0 0;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    /* Form area */
    .form-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 28px 0;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
      background: var(--bg-white);
    }

    .form-header {
      margin-bottom: 32px;
    }

    .form-header h1 {
      font-size: 24px;
      font-weight: 600;
      line-height: 30px;
      color: var(--text-strong);
      margin-bottom: 6px;
    }

    .form-header p {
      font-size: 15px;
      font-weight: 400;
      line-height: 22px;
      letter-spacing: -0.1px;
      color: var(--text-sub);
    }

    /* Form inputs */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      line-height: 18px;
      color: var(--text-sub);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-soft);
      display: flex;
      align-items: center;
      pointer-events: none;
      transition: color 0.15s ease;
    }

    .form-input {
      width: 100%;
      height: 52px;
      padding: 0 16px 0 48px;
      font-family: var(--font-family);
      font-size: 15px;
      font-weight: 400;
      line-height: 22px;
      color: var(--text-strong);
      background: var(--bg-weak);
      border: 1.5px solid transparent;
      border-radius: 14px;
      outline: none;
      transition: all 0.2s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    .form-input::placeholder {
      color: var(--text-soft);
    }

    .form-input:focus {
      background: var(--bg-white);
      border-color: var(--primary-base);
      box-shadow: 0 0 0 4px rgba(93, 47, 112, 0.08);
    }

    .form-input:focus + .input-icon,
    .form-input:focus ~ .input-icon {
      color: var(--primary-base);
    }

    .form-input.error {
      border-color: var(--error-base);
      background: var(--bg-white);
      box-shadow: 0 0 0 4px rgba(251, 55, 72, 0.08);
    }

    .password-wrapper .form-input {
      padding-right: 52px;
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-soft);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .password-toggle:active {
      color: var(--text-sub);
    }

    .error-message {
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      color: var(--error-base);
      margin-top: 6px;
      display: none;
    }

    .error-message.visible {
      display: block;
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .checkbox-wrapper input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--stroke-sub);
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all 0.15s ease;
    }

    .checkbox-wrapper input[type="checkbox"]:checked {
      background: var(--primary-base);
      border-color: var(--primary-base);
    }

    .checkbox-wrapper input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 2px;
      width: 5px;
      height: 10px;
      border: solid #FFFFFF;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .checkbox-label {
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      color: var(--text-sub);
      user-select: none;
    }

    .forgot-link {
      font-size: 14px;
      font-weight: 600;
      line-height: 20px;
      color: var(--primary-base);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .forgot-link:active {
      color: var(--primary-darker);
    }

    /* Premium gradient button */
    .btn-login {
      width: 100%;
      height: 54px;
      background: linear-gradient(135deg, var(--primary-base) 0%, var(--brand-400) 50%, var(--primary-darker) 100%);
      color: #FFFFFF;
      border: none;
      border-radius: 14px;
      font-family: var(--font-family);
      font-size: 16px;
      font-weight: 600;
      line-height: 24px;
      letter-spacing: -0.1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 16px rgba(93, 47, 112, 0.25), 0 1px 3px rgba(93, 47, 112, 0.15);
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(253, 220, 141, 0.15) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .btn-login:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(93, 47, 112, 0.2);
    }

    .btn-login:active::before {
      opacity: 1;
    }

    /* Footer badge */
    .powered-by {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: auto;
      padding-top: 24px;
      font-size: 12px;
      font-weight: 500;
      line-height: 16px;
      color: var(--text-disabled);
      letter-spacing: 0.2px;
    }

    .powered-by svg {
      color: var(--text-disabled);
    }

    /* Home indicator */
    .home-indicator {
      height: 34px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
      flex-shrink: 0;
      background: var(--bg-white);
    }

    .home-indicator-bar {
      width: 134px;
      height: 5px;
      background: var(--bg-strong);
      border-radius: 100px;
      opacity: 0.18;
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-content {
      animation: fadeInUp 0.6s ease-out;
    }

    .form-area {
      animation: fadeInUp 0.6s ease-out 0.15s both;
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <div class="dynamic-island"></div>

    <!-- Hero header -->
    <div class="hero-header">
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none">
            <rect x="0" y="9" width="3" height="3" rx="0.5" fill="white"/>
            <rect x="4.5" y="6" width="3" height="6" rx="0.5" fill="white"/>
            <rect x="9" y="3" width="3" height="9" rx="0.5" fill="white"/>
            <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="white"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="white"/>
            <path d="M4.93 7.82a4.5 4.5 0 016.14 0" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M2.1 5a8 8 0 0111.8 0" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
            <rect x="0.5" y="0.5" width="22" height="12" rx="2.5" stroke="white" stroke-opacity="0.35"/>
            <rect x="2" y="2" width="19" height="9" rx="1.5" fill="white"/>
            <path d="M24 4.5v4a1.5 1.5 0 000-4z" fill="white" fill-opacity="0.4"/>
          </svg>
        </div>
      </div>

      <div class="hero-pattern"></div>

      <div class="hero-content">
        <div class="brand-logo">
          <div class="brand-logo-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 21h18M5 21V7l7-4 7 4v14" stroke="#2A1731" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9 21v-4h6v4M9 9h1M14 9h1M9 13h1M14 13h1" stroke="#2A1731" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="brand-logo-text">Merlin<span>AI</span></span>
        </div>
        <p class="hero-tagline">Your projects, workforce & materials — all in one place</p>
      </div>
    </div>

    <div class="curve-transition"></div>

    <!-- Form area -->
    <div class="form-area">
      <div class="form-header">
        <h1>Welcome back</h1>
        <p>Sign in to continue to your dashboard</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              placeholder="you@company.com"
              autocomplete="email"
              inputmode="email"
              required
            >
            <div class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M22 4l-10 8L2 4"/>
              </svg>
            </div>
          </div>
          <div class="error-message" id="emailError">Please enter a valid email address</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper password-wrapper">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <div class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </div>
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="error-message" id="passwordError">Password is required</div>
        </div>

        <div class="form-row">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="remember" name="remember">
            <span class="checkbox-label">Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          Sign in
        </button>
      </form>

      <div class="powered-by">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Secured by MerlinAI
      </div>
    </div>

    <div class="home-indicator">
      <div class="home-indicator-bar"></div>
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('passwordToggle');

    passwordToggle.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      passwordToggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function clearError(input, errorEl) {
      input.classList.remove('error');
      errorEl.classList.remove('visible');
    }

    emailInput.addEventListener('input', () => clearError(emailInput, emailError));
    passwordInput.addEventListener('input', () => clearError(passwordInput, passwordError));

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      let valid = true;

      if (!validateEmail(emailInput.value.trim())) {
        emailInput.classList.add('error');
        emailError.classList.add('visible');
        valid = false;
      }

      if (!passwordInput.value) {
        passwordInput.classList.add('error');
        passwordError.classList.add('visible');
        valid = false;
      }

      if (valid) {
        const btn = document.getElementById('loginBtn');
        btn.textContent = 'Signing in...';
        btn.disabled = true;
        btn.style.opacity = '0.7';

        setTimeout(() => {
          btn.textContent = 'Sign in';
          btn.disabled = false;
          btn.style.opacity = '1';
          alert('Login prototype — no backend connected.');
        }, 1500);
      }
    });
  </script>
</body>
</html>
